<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Furious Industries RP</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #06060a; --card: #0f0f1a; --border: #1e1e30;
      --primary: #ff4500; --primary-glow: rgba(255,69,0,0.25);
      --text: #b8b8cc; --text-bright: #ffffff; --muted: #5a5a72;
      --input-bg: #0a0a14; --error: #ef4444;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }
    .login-wrapper { position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 24px; }
    .login-logo { text-align: center; margin-bottom: 40px; }
    .login-logo a { display: inline-block; font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--text-bright); text-decoration: none; }
    .logo-accent { color: var(--primary); }
    .logo-icon { font-size: 2rem; display: block; margin-bottom: 8px; }
    .login-card {
      background: rgba(15,15,26,0.95); border: 1px solid var(--border);
      border-radius: 12px; padding: 40px; backdrop-filter: blur(20px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 40px var(--primary-glow);
    }
    .login-card h1 { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--text-bright); margin-bottom: 6px; }
    .login-card p { font-size: 0.875rem; color: var(--muted); margin-bottom: 32px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
    input {
      width: 100%; padding: 12px 16px; background: var(--input-bg);
      border: 1px solid var(--border); border-radius: 6px; color: var(--text-bright);
      font-size: 0.9rem; font-family: inherit; transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
    .login-btn {
      width: 100%; padding: 14px; background: var(--primary); color: white;
      border: none; border-radius: 6px; font-family: 'Orbitron', sans-serif;
      font-weight: 700; font-size: 0.9rem; letter-spacing: 0.1em; cursor: pointer;
      transition: all 0.2s; margin-top: 8px;
    }
    .login-btn:hover:not(:disabled) { background: #ff6528; box-shadow: 0 0 24px var(--primary-glow); transform: translateY(-1px); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; padding: 12px 16px; border-radius: 6px; font-size: 0.85rem; margin-bottom: 20px; display: none; }
    .error-msg.show { display: block; }
    .login-back { text-align: center; margin-top: 24px; font-size: 0.8rem; color: var(--muted); }
    .login-back a { color: var(--primary); text-decoration: none; }
    .login-back a:hover { text-decoration: underline; }
    .login-hint { margin-top: 20px; padding: 12px 16px; background: rgba(255,69,0,0.06); border: 1px solid rgba(255,69,0,0.15); border-radius: 6px; font-size: 0.75rem; color: var(--muted); line-height: 1.6; }
    .login-hint strong { color: var(--primary); }
  </style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="login-wrapper">
  <div class="login-logo">
    <a href="/">
      <span class="logo-icon">⚡</span>
      FURIOUS <span class="logo-accent">INDUSTRIES</span>
    </a>
  </div>
  <div class="login-card">
    <h1>PANEL DE ADMINISTRACIÓN</h1>
    <p>Ingresa tus credenciales para continuar</p>
    <div class="error-msg" id="errorMsg"></div>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">INICIAR SESIÓN</button>
    </form>
    <div class="login-hint">
      <strong>Credenciales por defecto:</strong><br>
      Usuario: <strong>admin</strong> — Contraseña: <strong>admin123</strong><br>
      Cámbialas desde el panel de configuración.
    </div>
  </div>
  <div class="login-back">
    <a href="/">← Volver al sitio principal</a>
  </div>
</div>

<script>
  // Background canvas
  (function() {
    const c = document.getElementById('bg');
    const ctx = c.getContext('2d');
    c.width = window.innerWidth; c.height = window.innerHeight;
    const pts = Array.from({length:60}, () => ({ x: Math.random()*c.width, y: Math.random()*c.height, vx:(Math.random()-.5)*.3, vy:(Math.random()-.5)*.3 }));
    (function draw() {
      ctx.fillStyle='#06060a'; ctx.fillRect(0,0,c.width,c.height);
      for(let i=0;i<50;i+=10){ctx.strokeStyle='rgba(30,30,48,0.3)';ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(i*c.width/50,0);ctx.lineTo(i*c.width/50,c.height);ctx.stroke();}
      pts.forEach(p=>{ p.x+=p.vx;p.y+=p.vy; if(p.x<0)p.x=c.width; if(p.x>c.width)p.x=0; if(p.y<0)p.y=c.height; if(p.y>c.height)p.y=0; ctx.beginPath();ctx.arc(p.x,p.y,1.5,0,Math.PI*2);ctx.fillStyle='rgba(255,69,0,0.3)';ctx.fill(); });
      requestAnimationFrame(draw);
    })();
  })();

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');
    btn.disabled = true;
    btn.textContent = 'VERIFICANDO...';
    err.classList.remove('show');
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: document.getElementById('username').value, password: document.getElementById('password').value })
      });
      const data = await res.json();
      if (res.ok && data.success) {
        btn.textContent = '✓ ACCESO CONCEDIDO';
        setTimeout(() => window.location.href = '/admin', 600);
      } else {
        err.textContent = data.error || 'Error al iniciar sesión';
        err.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'INICIAR SESIÓN';
      }
    } catch(ex) {
      err.textContent = 'Error de conexión con el servidor';
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'INICIAR SESIÓN';
    }
  });
</script>
</body>
</html>
