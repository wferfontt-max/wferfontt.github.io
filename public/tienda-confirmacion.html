<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmación de Pago — Furious Industries RP</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .confirm-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 100px 20px 60px; }
    .confirm-card { background: rgba(11,11,22,0.93); border: 1px solid #1e1e30; border-radius: 14px; padding: 52px 44px; width: 100%; max-width: 480px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .confirm-icon { font-size: 4rem; margin-bottom: 20px; line-height: 1; }
    .confirm-title { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 700; color: #fff; margin-bottom: 10px; }
    .confirm-sub { font-size: 0.9rem; color: #8888aa; line-height: 1.6; margin-bottom: 28px; }
    .confirm-detail { background: rgba(5,5,10,0.7); border: 1px solid #1e1e30; border-radius: 8px; padding: 16px 20px; margin-bottom: 28px; text-align: left; }
    .confirm-detail-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #1e1e30; font-size: 0.85rem; }
    .confirm-detail-row:last-child { border-bottom: none; }
    .confirm-detail-label { color: #5a5a72; }
    .confirm-detail-value { color: #fff; font-weight: 600; }
    .confirm-detail-value.green { color: #4ade80; }
    .confirm-detail-value.red { color: #f87171; }
    .confirm-detail-value.yellow { color: #facc15; }
    .confirm-btn { display: inline-flex; align-items: center; gap: 10px; padding: 12px 28px; background: #00c4cc; color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.8rem; font-weight: 700; letter-spacing: .07em; border-radius: 7px; text-decoration: none; transition: all .2s; }
    .confirm-btn:hover { background: #00d4de; }
    .confirm-btn.secondary { background: transparent; border: 1px solid #1e1e30; color: #8888aa; }
    .confirm-btn.secondary:hover { border-color: rgba(0,196,204,.3); color: #00c4cc; }
    .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
<nav class="navbar" id="navbar">
  <div class="nav-container">
    <div class="nav-logo">
      <a href="/" class="nav-logo-link">
        <img src="/img/logo.gif" class="nav-logo-img" alt="Furious Industries" onerror="this.outerHTML='<span class=\'logo-icon\'>⚡</span><span>FURIOUS <span class=\'logo-accent\'>INDUSTRIES</span></span>'">
      </a>
    </div>
    <div class="nav-links" id="navLinks">
      <a href="/">Inicio</a>
      <a href="/equipo">Equipo</a>
      <a href="/facciones">Facciones</a>
      <a href="/noticias">Noticias</a>
      <a href="/foro">Foro</a>
      <a href="/tienda" style="color:var(--primary)">Tienda</a>
      <a href="#" id="navDiscord" target="_blank" rel="noopener" style="color:#5865f2">Discord</a>
      <a href="/registro">Registro</a>
      <a href="/admin/login" class="nav-admin">⚙ Admin</a>
    </div>
    <button class="nav-mobile-toggle" id="mobileToggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div class="confirm-wrap">
  <div class="confirm-card" id="confirmCard">
    <div class="confirm-icon">⏳</div>
    <div class="confirm-title">Verificando pago...</div>
    <div class="confirm-sub">Estamos confirmando tu transacción con WebPay.</div>
  </div>
</div>

<script>
function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }

function fmtPrice(v) { return '$' + parseFloat(v || 0).toLocaleString('es-CL'); }

function renderResult(card, type, title, msg, purchases) {
  const icons = { success: '✅', error: '❌', pending: '⏳', cancelled: '🚫' };
  let detailHtml = '';
  if (purchases && purchases.length) {
    const total = purchases.reduce((s, p) => s + parseFloat(p.item_price || 0), 0);
    const rows = purchases.map(p =>
      `<div class="confirm-detail-row"><span class="confirm-detail-label">${esc(p.item_name)}</span><span class="confirm-detail-value">${fmtPrice(p.item_price)}</span></div>`
    ).join('');
    const statusColor = type === 'success' ? 'green' : type === 'error' || type === 'cancelled' ? 'red' : 'yellow';
    const statusLabel = type === 'success' ? 'Aprobado' : type === 'cancelled' ? 'Cancelado' : 'Rechazado';
    detailHtml = `<div class="confirm-detail">
      ${rows}
      ${purchases.length > 1 ? `<div class="confirm-detail-row" style="border-top:1px solid #2a2a3e;margin-top:4px;padding-top:8px;"><span class="confirm-detail-label" style="font-weight:600">Total</span><span class="confirm-detail-value" style="color:#00c4cc">${fmtPrice(total)}</span></div>` : ''}
      <div class="confirm-detail-row"><span class="confirm-detail-label">Orden</span><span class="confirm-detail-value" style="font-size:.72rem;word-break:break-all">${esc(purchases[0].buy_order)}</span></div>
      <div class="confirm-detail-row"><span class="confirm-detail-label">Estado</span><span class="confirm-detail-value ${statusColor}">${statusLabel}</span></div>
    </div>`;
  }
  card.innerHTML = `
    <div class="confirm-icon">${icons[type] || '❓'}</div>
    <div class="confirm-title">${esc(title)}</div>
    <div class="confirm-sub">${esc(msg)}</div>
    ${detailHtml}
    <div class="btn-row">
      ${type === 'success' ? '<a class="confirm-btn" href="/perfil">Ver mis compras</a>' : ''}
      <a class="confirm-btn ${type === 'success' ? 'secondary' : ''}" href="/tienda">Volver a la tienda</a>
    </div>`;
}

document.addEventListener('DOMContentLoaded', async () => {
  const nav = document.getElementById('navbar');
  window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 50), { passive: true });
  document.getElementById('mobileToggle').addEventListener('click', () => document.getElementById('navLinks').classList.toggle('open'));
  fetch('/api/stats').then(r => r.json()).then(({ data }) => { const d = document.getElementById('navDiscord'); if (d && data.discord_url) d.href = data.discord_url; }).catch(() => {});

  const params  = new URLSearchParams(location.search);
  const result  = params.get('result');   // success | failed | cancelled | error
  const buyOrder = params.get('buy_order');
  const card    = document.getElementById('confirmCard');

  // Determine result type from param
  const typeMap = { success: 'success', failed: 'error', cancelled: 'cancelled', error: 'error' };
  const type = typeMap[result] || 'error';

  const messages = {
    success:   ['¡Pago Aprobado!',       'Tu compra fue procesada exitosamente por Transbank. Los beneficios serán aplicados en el servidor.'],
    failed:    ['Pago Rechazado',         'Tu transacción fue rechazada por Transbank. Verifica tu saldo o intenta con otra tarjeta.'],
    cancelled: ['Pago Cancelado',         'Cancelaste el proceso de pago. Puedes intentarlo nuevamente cuando quieras.'],
    error:     ['Error en la Transacción','Ocurrió un error inesperado. Si realizaste un pago, contacta al administrador.'],
  };
  const [title, msg] = messages[result] || messages.error;

  // If we have a buy_order, fetch the purchase details from the server
  if (buyOrder && result === 'success') {
    try {
      const r = await fetch(`/api/store/status?buy_order=${encodeURIComponent(buyOrder)}`);
      if (r.ok) {
        const { data } = await r.json();
        renderResult(card, type, title, msg, data);
        return;
      }
    } catch (_) {}
  }

  renderResult(card, type, title, msg, null);
});
</script>
<script src="/js/user-nav.js"></script>
</body>
</html>
